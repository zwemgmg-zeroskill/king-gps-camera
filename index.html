<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Engineering Camera</title>
    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #videoElement { width: 100vw; height: 100vh; object-fit: cover; }
        #map { position: absolute; top: -9999px; width: 300px; height: 300px; }
        .ui-overlay { position: absolute; bottom: 0; width: 100%; padding: 20px; background: rgba(0,0,0,0.5); color: #fff; z-index: 10; }
        #captureBtn { width: 80px; height: 80px; border-radius: 50%; background: #fff; border: none; margin: 0 auto; display: block; }
    </style>
</head>
<body>

<video id="videoElement" autoplay playsinline></video>
<div id="map"></div>

<div class="ui-overlay">
    <input type="text" id="customText" placeholder="Custom Note" style="width:100%; margin-bottom:10px;">
    <button id="captureBtn" onclick="processPhoto()">📸</button>
</div>

<canvas id="mainCanvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    
    // Camera Start
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => video.srcObject = stream);

    async function processPhoto() {
        // 1. Capture Video Frame
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        // 2. Draw Stamp Area
        ctx.fillStyle = "rgba(0,0,0,0.8)";
        ctx.fillRect(0, canvas.height - 300, canvas.width, 300);

        // 3. Draw Text
        ctx.fillStyle = "#FFD700";
        ctx.font = "bold 60px Arial";
        ctx.fillText("CITY SCHOOL YANGON AC PROJECT", 40, canvas.height - 220);
        
        ctx.fillStyle = "#fff";
        ctx.fillText("KING ENGINEERING", 40, canvas.height - 150);
        
        ctx.fillStyle = "#4CAF50";
        ctx.fillText(document.getElementById('customText').value, 40, canvas.height - 80);
        
        ctx.fillStyle = "#fff";
        ctx.font = "40px Arial";
        ctx.fillText(new Date().toLocaleString(), 40, canvas.height - 20);

        // 4. Save
        const link = document.createElement('a');
        link.download = 'King_Engineering_' + Date.now() + '.jpg';
        link.href = canvas.toDataURL('image/jpeg', 1.0);
        link.click();
    }
</script>
</body>
</html>
